<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AT Refresh Capture</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <main class="panel">
    <h1>Adobe AT Refresh Capture</h1>
    <p id="status" class="status">Loading...</p>

    <div class="actions">
      <button id="toggleBtn" type="button">Pause</button>
      <button id="exportBtn" type="button">Export Refresh Bundle</button>
      <button id="clearBtn" type="button" class="danger">Clear</button>
    </div>

    <p class="hint">
      Steps: start capture, log in on firefly.adobe.com, then export bundle.
    </p>
  </main>

  <script src="popup.js"></script>
</body>
</html>
